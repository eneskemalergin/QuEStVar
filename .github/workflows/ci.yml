name: CI

on:
  push:
    branches: [main]
    paths-ignore: ["plan/**", "assets/**", "tmp/**"]
  pull_request:
    branches: [main]
    paths-ignore: ["plan/**", "assets/**", "tmp/**"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUNBUFFERED: "1"
  MPLBACKEND: Agg

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-suffix: lint

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync --only-dev

      - name: Check ruff format
        run: uv run ruff format --check src/questvar/ tests/

      - name: Check ruff lint
        run: uv run ruff check src/questvar/ tests/

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-suffix: typecheck

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync --only-dev

      - name: Run mypy
        run: uv run mypy src/questvar/

  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    needs: [lint, typecheck]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13", "3.14"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-suffix: test-${{ matrix.os }}-${{ matrix.python-version }}

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install the package and dev dependencies
        run: uv sync --dev

      - name: Run tests (default suite)
        run: uv run pytest tests/ -v --tb=short -x

      - name: Run tests with hypothesis profile
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: uv run pytest tests/test_ttest.py tests/test_config.py -v --tb=short -x --hypothesis-profile=ci

  build:
    name: Build package
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Build sdist and wheel
        run: uv build

      - name: Upload built package
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Verify sdist installs clean
        run: uv tool run --from dist/questvar-0.1.0.tar.gz python -c "import questvar; print(f'questvar {questvar.__version__}')"

      - name: Verify wheel installs clean
        run: uv tool run --from dist/questvar-0.1.0-py3-none-any.whl python -c "import questvar; print(f'questvar {questvar.__version__}')"
